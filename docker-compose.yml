services:
  bot:
    build: .
    container_name: inspection-bot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8443:8443"
    networks:
      - default
      - frappe_network

  redis:
    image: redis:7-alpine
    container_name: inspection-bot-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default

volumes:
  redis-data:

networks:
  default:
    driver: bridge
  frappe_network:
    external: true
    name: frappe_docker_frappe_network
